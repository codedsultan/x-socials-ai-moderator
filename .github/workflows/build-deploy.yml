name: Build & Deploy

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

# Cancel any in-flight run for the same branch when a new push arrives.
# Prevents two deploys racing to Ansible on rapid successive pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # ────────────────────────────────────────────────────────────────
  # 1. CI — ruff, mypy, pytest
  # ────────────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: |
          ruff check app/ tests/
          ruff format --check app/ tests/

      - name: Type check (mypy)
        run: mypy app/

      - name: Run tests
        env:
          # ── App env ──────────────────────────────────────────────
          APP_ENV:    testing
          DEBUG:      "true"
          SECRET_KEY: test-secret-key
          LOG_LEVEL:  DEBUG
          LOG_JSON:   "false"

          # ── Moderation ───────────────────────────────────────────
          # rule mode: uses detoxify locally, no API keys needed.
          # detoxify falls back to safe passthrough if torch isn't installed,
          # which is fine for CI — the backend tests mock the model directly.
          MODERATION_MODE: rule

          # Dummy values so pydantic-settings doesn't raise on missing fields.
          # No real API calls are made in tests (everything is mocked).
          ANTHROPIC_API_KEY:   test-anthropic-key
          OPENAI_API_KEY:      test-openai-key
          OPENROUTER_API_KEY:  test-openrouter-key
          API_KEY:             test-api-key

          # ── Databases ────────────────────────────────────────────
          # SQLite for tests — no Postgres or MySQL service needed in CI.
          # db_client.py already has SQLite dialect branches (ON CONFLICT etc.).
          LARAVEL_DB_URL: sqlite+aiosqlite:///./test.db

          # MongoDB is not used in tests (scan_service is not exercised).
          # Empty string causes get_mongo_db() to raise RuntimeError only
          # if a test actually calls it — none currently do.
          MONGODB_URI: ""

        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      # - name: Upload coverage
      #   uses: codecov/codecov-action@v4
      #   if: always()
      #   with:
      #     files: ./coverage.xml
      #     fail_ci_if_error: false

  # ────────────────────────────────────────────────────────────────
  # 2. Build & Push Docker image
  # ────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    # Only build on pushes to main/develop — not on PRs
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/x-socials-ai-moderator

    outputs:
      image_tag:   ${{ steps.tags.outputs.deploy_tag }}
      environment: ${{ steps.env.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Set image tags
        id: tags
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "deploy_tag=${SHORT_SHA}"                                                        >> $GITHUB_OUTPUT
            echo "all_tags=${{ env.IMAGE_NAME }}:latest,${{ env.IMAGE_NAME }}:${SHORT_SHA}"      >> $GITHUB_OUTPUT
          else
            echo "deploy_tag=develop-${SHORT_SHA}"                                               >> $GITHUB_OUTPUT
            echo "all_tags=${{ env.IMAGE_NAME }}:develop,${{ env.IMAGE_NAME }}:develop-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file:    ./Dockerfile
          target:  runtime
          push:    true
          tags:    ${{ steps.tags.outputs.all_tags }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Image build summary
        run: |
          echo "## 🐍 Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ steps.env.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deploy tag:** \`${{ steps.tags.outputs.deploy_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Stack:** FastAPI (uvicorn), asyncio RealtimeQueue, no Celery/Redis" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────────
  # 3. Trigger Ansible deployment
  # ────────────────────────────────────────────────────────────────
  trigger-deployment:
    name: Trigger Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: needs.build-and-push.outputs.environment != ''

    steps:
      - name: Dispatch to infra repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token:          ${{ secrets.INFRA_REPO_PAT }}
          repository:     codedsultan/x-infra-socials-ai
          event-type:     deploy-app
          client-payload: |
            {
              "environment":    "${{ needs.build-and-push.outputs.environment }}",
              "tag":            "${{ needs.build-and-push.outputs.image_tag }}",
              "commit_sha":     "${{ github.sha }}",
              "commit_message": "${{ github.event.head_commit.message }}",
              "triggered_by":   "${{ github.actor }}",
              "repo":           "${{ github.repository }}",
              "run_id":         "${{ github.run_id }}"
            }